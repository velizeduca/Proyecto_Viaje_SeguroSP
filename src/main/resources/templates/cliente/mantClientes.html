<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Mantenimiento de Clientes</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- DataTables -->
<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

</head>

<body>

<div class="container-fluid mt-4">

	<div class="card shadow">

		<div class="card-header bg-primary text-white">
			<h3 class="mb-0">Mantenimiento de Clientes</h3>
		</div>

		<div class="card-body">

			<div class="alert alert-info">
				<span th:text="${mensaje}"></span>
			</div>

			<div class="d-flex justify-content-between mb-3">

				<button id="btnNuevo"
						class="btn btn-success"
						data-bs-toggle="modal"
						data-bs-target="#modalCliente">

					<i class="bi bi-plus-circle"></i>
					Nuevo Cliente

				</button>

			</div>

			<div id="mensajeExito"
			     th:if="${mensajeExito}"
			     class="alert alert-success alert-dismissible fade show">

				<span th:text="${mensajeExito}"></span>

				<button type="button"
				        class="btn-close"
				        data-bs-dismiss="alert">
				</button>

			</div>

			<table id="tablaCliente"
				   class="table table-bordered table-hover table-striped">

				<thead class="table-dark">

					<tr>
						<th>ID</th>
						<th>DNI</th>
						<th>Nombres</th>
						<th>Apellidos</th>
						<th>Teléfono</th>
						<th>Correo</th>
						<th>Estado</th>
						<th>Acciones</th>
					</tr>

				</thead>

				<tbody>

					<tr th:each="c : ${clientes}">

						<td th:text="${c.idCliente}"></td>
						<td th:text="${c.dni}"></td>
						<td th:text="${c.nombres}"></td>
						<td th:text="${c.apellidos}"></td>
						<td th:text="${c.telefono}"></td>
						<td th:text="${c.correo}"></td>

						<td>
							<span class="badge"
								th:classappend="${c.estado=='ACTIVO'} ?
								' bg-success' : ' bg-danger'"
								th:text="${c.estado}">
							</span>
						</td>

						<td>

							<button class="btn btn-warning btn-sm btnEditar"
									th:data-id="${c.idCliente}">
								<i class="bi bi-pencil-square"></i>
							</button>

							<button class="btn btn-danger btn-sm btnEliminar"
									th:data-id="${c.idCliente}">
								<i class="bi bi-trash"></i>
							</button>

						</td>

					</tr>

				</tbody>

			</table>

		</div>

	</div>

</div>

<!-- JQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<script>

$(document).ready(function() {

	$('#tablaCliente').DataTable({

		language : {
			url : 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'
		}

	});

});

$(document).on("click", ".btnEditar", function() {

	let id = $(this).data("id");

	$("#tituloModal").text("Editar Cliente");

	$("#frmCliente").attr("action",
			"/gestioncliente/actualizar");

	$.get("/gestioncliente/buscar/" + id,
	function(data){

		$("#idCliente").val(data.idCliente);
		$("#dni").val(data.dni);
		$("#nombres").val(data.nombres);
		$("#apellidos").val(data.apellidos);
		$("#telefono").val(data.telefono);
		$("#correo").val(data.correo);
		$("#estado").val(data.estado);

		$("#modalCliente").modal("show");

	});

});

$("#btnNuevo").click(function() {

	$("#tituloModal").text("Registrar Cliente");

	$("#frmCliente").attr("action",
			"/gestioncliente/registrar");

	$("#idCliente").val(0);
	$("#dni").val("");
	$("#nombres").val("");
	$("#apellidos").val("");
	$("#telefono").val("");
	$("#correo").val("");
	$("#estado").val("ACTIVO");

});

$(document).on("click", ".btnEliminar", function() {

	let id = $(this).data("id");

	if(confirm("¿Desea desactivar este cliente?")) {

		window.location =
			"/gestioncliente/desactivar/" + id;

	}

});

</script>

<!-- MODAL -->

<div class="modal fade"
	 id="modalCliente"
	 tabindex="-1">

	<div class="modal-dialog modal-lg">

		<div class="modal-content">

			<form id="frmCliente"
				  th:action="@{/gestioncliente/registrar}"
				  th:object="${cliente}"
				  method="post">

				<input type="hidden"
					   id="idCliente"
					   th:field="*{idCliente}">

				<div class="modal-header">

					<h5 class="modal-title"
						id="tituloModal">

						Registrar Cliente

					</h5>

					<button type="button"
							class="btn-close"
							data-bs-dismiss="modal">
					</button>

				</div>

				<div class="modal-body">

					<div class="row">

						<div class="col-md-6 mb-3">
							<label>DNI</label>
							<input id="dni"
								   type="text"
								   maxlength="8"
								   class="form-control"
								   th:field="*{dni}">
						</div>

						<div class="col-md-6 mb-3">
							<label>Nombres</label>
							<input id="nombres"
								   type="text"
								   class="form-control"
								   th:field="*{nombres}">
						</div>

						<div class="col-md-6 mb-3">
							<label>Apellidos</label>
							<input id="apellidos"
								   type="text"
								   class="form-control"
								   th:field="*{apellidos}">
						</div>

						<div class="col-md-6 mb-3">
							<label>Teléfono</label>
							<input id="telefono"
								   type="text"
								   class="form-control"
								   th:field="*{telefono}">
						</div>

						<div class="col-md-6 mb-3">
							<label>Correo</label>
							<input id="correo"
								   type="email"
								   class="form-control"
								   th:field="*{correo}">
						</div>

						<div class="col-md-6 mb-3">
							<label>Estado</label>

							<select id="estado"
									class="form-select"
									th:field="*{estado}">

								<option value="ACTIVO">ACTIVO</option>
								<option value="INACTIVO">INACTIVO</option>

							</select>

						</div>

					</div>

				</div>

				<div class="modal-footer">

					<button type="button"
							class="btn btn-secondary"
							data-bs-dismiss="modal">
						Cerrar
					</button>

					<button type="submit"
							class="btn btn-primary">
						Guardar
					</button>

				</div>

			</form>

		</div>

	</div>

</div>

<script>
setTimeout(function() {

	let mensaje =
		document.getElementById("mensajeExito");

	if(mensaje){

		let alerta =
			new bootstrap.Alert(mensaje);

		alerta.close();

	}

}, 3000);
</script>

</body>
</html>
