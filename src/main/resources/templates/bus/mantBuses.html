<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Mantenimiento de Buses</title>
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-
icons.min.css">
<!-- DataTables -->
<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
</head>
<body>
<div class="container-fluid mt-4">
<div class="card shadow">
<div class="card-header bg-primary text-white">
<h3 class="mb-0">Mantenimiento de Buses</h3>
</div>
<div class="card-body">
<div class="alert alert-info">
<span th:text="${mensaje}"></span>
</div>
<div class="d-flex justify-content-between mb-3">
<div>
	
<button id="btnNuevo" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalBus">
<i class="bi bi-plus-circle"></i>
			Nuevo Bus
	</button>

	
	
</div>
</div>

<div id="msg"
		th:if="${mensajeExito}"
	class="alert alert-success alert-dismissible fade show">
			    <span th:text="${mensajeExito}"></span>
			    <button type="button"
			            class="btn-close"
			            data-bs-dismiss="alert">
			    </button>
</div>



<table id="tablaBus"
class="table table-bordered table-hover table-striped">
<thead class="table-dark">
<tr>
<th>ID</th>
<th>Marca</th>
<th>Modelo</th>
<th>Placa</th>
<th>Capacidad</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>
<tbody>
<tr th:each="b:${buses}">
<td th:text="${b.idBus}"></td>
<td th:text="${b.marcaBus.nombre}"></td>
<td th:text="${b.modelo}"></td>
<td th:text="${b.placa}"></td>
<td th:text="${b.capacidad}"></td>
<td>
	<span class="badge" th:classappend="${b.estado=='ACTIVO'} ?
						' bg-success':
					     ' bg-danger'"
		 th:text="${b.estado}">
		</span>

</td>
<td>
	
<button  class="btn btn-warning btn-sm btnEditar" th:data-id="${b.idBus}">
<i class="bi bi-pencil-square"></i>
</button>


<button class="btn btn-danger btn-sm btnEliminar" th:data-id="${b.idBus}">
<i class="bi bi-trash"></i>
</button>



</td>
</tr>
</tbody>
</table>
</div>
</div>
</div>
<!-- JQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- Bootstrap -->
<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- DataTables -->
<script
src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script
src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script>
	
	$(document).on("click", ".btnEditar", function() {

			let id = $(this).data("id");
			$("#tituloModal").text("Editar Bus");
			$("#frmBus").attr("action","/gestionbus/actualizar");
			$.get("/gestionbus/buscar/" + id, function(data) {
				$("#idBus").val(data.idBus);
				$("#marcaBus").val(data.marcaBus.idMarcaBus);
				$("#modelo").val(data.modelo);
				$("#placa").val(data.placa);
				$("#capacidad").val(data.capacidad);
				$("#estado").val(data.estado);
	$("#modalBus").modal("show");
			});

		});


		$("#btnNuevo").click(function() {
			$("#tituloModal").text("Registrar Bus");
			$("#frmBus").attr("action","/gestionbus/registrar");
			$("#idBus").val(0);
			$("#marcaBus").val("0");
			$("#modelo").val("");
			$("#placa").val("");
			$("#capacidad").val("");
			$("#estado").val("ACTIVO");

		});

	
		$(document).on("click", ".btnEliminar", function() {
			let id = $(this).data("id");
			if(confirm("¿Desea desactivar este bus?")) {
				window.location ="/gestionbus/desactivar/" + id;
			}
		});
	
		
			
		

$(document).ready(function() {
$('#tablaBus').DataTable({
language : {
url : 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'
}
});
});
</script>


<!--Ventana modal-->

<div class="modal fade" id="modalBus" tabindex="-1">
	<div class="modal-dialog modal-lg">
		<div class="modal-content">
	<form id="frmBus" th:action="@{/gestionbus/registrar}" th:object="${bus}" method="post">
		 <input type="hidden" id="idBus" th:field="*{idBus}">  
				
			<div class="modal-header">
				<h5 class="modal-title" id="tituloModal">
					Registrar Bus
				</h5>
				<button type="button"
						class="btn-close"
						data-bs-dismiss="modal">
				</button>
			</div>
			<div class="modal-body">
				<div class="row">
					<div class="col-md-6 mb-3">
						<label>Marca Bus</label>
						<select id="marcaBus" class="form-select" th:field="*{marcaBus.idMarcaBus}">
							<option value="0">
								Seleccione Marca
							</option>
							<option
								th:each="m:${marcas}"
								th:value="${m.idMarcaBus}"
								th:text="${m.nombre}">
							</option>
						</select>
					</div>
					<div class="col-md-6 mb-3">
						<label>Modelo</label>
						<input id="modelo" type="text" class="form-control" th:field="*{modelo}">
					</div>
					<div class="col-md-6 mb-3">
						<label>Placa</label>
						<input id="placa" type="text" class="form-control" th:field="*{placa}">
					</div>
					<div class="col-md-6 mb-3">

						<label>Capacidad</label>

						<input id="capacidad" type="number" class="form-control" th:field="*{capacidad}">
					</div>
					<div class="col-md-6 mb-3">
						<label>Estado</label>
						<select id="estado" class="form-select" th:field="*{estado}">
							<option value="ACTIVO">ACTIVO</option>
							<option value="INACTIVO">INACTIVO</option>
						</select>
					</div>
				</div>
			</div>

			<div class="modal-footer">
			<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
					Cerrar
				</button>
				<button type="submit"
						class="btn btn-primary">
					Guardar
				</button>
			</div>
			</form>
		</div>
	</div>
</div>


<script>
setTimeout(function() {
	let mensaje = document.getElementById("msg");
	if(mensaje){
		let alerta =new bootstrap.Alert(mensaje);
	alerta.close();
	}
}, 2000);
</script>


</body>
</html>
